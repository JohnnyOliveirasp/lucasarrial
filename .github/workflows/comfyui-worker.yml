name: Build ComfyUI Worker

# Cancela runs anteriores na mesma branch se um novo push chegar (mesmo
# esquema do runpod-worker: evita builds presos/superados acumulando).
concurrency:
  group: comfyui-worker-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [dev, main, master]
    paths:
      - 'comfyui-worker/**'
      - '.github/workflows/comfyui-worker.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (root)
        run: |
          echo "=== BEFORE ==="
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /opt/microsoft
          sudo rm -rf /opt/google
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          echo "=== AFTER ==="
          df -h /

      - name: Set lowercase repo owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.owner }}/lucasarrial-comfyui
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./comfyui-worker
          file: ./comfyui-worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke import (sageattention)
        run: |
          IMG="ghcr.io/${{ steps.owner.outputs.owner }}/lucasarrial-comfyui:${GITHUB_SHA::7}"
          docker run --rm --entrypoint python "$IMG" -c "import sageattention; print('sageattention OK', sageattention.__version__ if hasattr(sageattention,'__version__') else '')"
          docker run --rm --entrypoint python "$IMG" -c "import torchaudio; print('torchaudio OK', torchaudio.__version__)"
