name: Build RunPod Worker

# Cancela runs anteriores na mesma branch se um novo push chegar. Evita
# acumular builds presos / superados (push novo enquanto o anterior trava
# em pull de base image / push do GHCR).
concurrency:
  group: runpod-worker-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [dev, main, master]
    paths:
      - 'runpod-worker/**'
      - '.github/workflows/runpod-worker.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (root)
        run: |
          echo "=== BEFORE ==="
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /opt/microsoft
          sudo rm -rf /opt/google
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          echo "=== AFTER ==="
          df -h /

      - name: Set lowercase repo owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.owner }}/lucasarrial-runpod
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-worker
          file: ./runpod-worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy no RunPod SEM recriar endpoint (lição InfiniteTalk 2026-07-08):
  # aponta o TEMPLATE pra tag imutável do commit + recicla workers (0 -> N).
  # Só na main (produção). Requer secret RUNPOD_API_KEY no repositório.
  deploy-runpod:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
      TEMPLATE_ID: 03vs3iiph6
      ENDPOINT_ID: 2jcta960kzc2m4
      WORKERS_MAX: "3"
    steps:
      - name: Set lowercase repo owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Point template to new image + recycle workers
        run: |
          if [ -z "$RUNPOD_API_KEY" ]; then
            echo "::warning::secret RUNPOD_API_KEY ausente — pulei o deploy no RunPod (fazer manual)."
            exit 0
          fi
          IMG="ghcr.io/${{ steps.owner.outputs.owner }}/lucasarrial-runpod:${GITHUB_SHA::7}"
          echo "template -> $IMG"
          # Template acoplado ao endpoint NAO existe no REST (/v1/templates -> 404).
          # Unico caminho que funciona e o GraphQL saveTemplate (validado 2026-07-09).
          QUERY=$(printf 'mutation { saveTemplate(input: { id: "%s", name: "fast_cloner_runpod_002__template__67cmg", imageName: "%s", containerDiskInGb: 50, volumeInGb: 0, dockerArgs: "", env: [], isServerless: true }) { id imageName } }' "$TEMPLATE_ID" "$IMG")
          RESP=$(curl -sf -X POST "https://api.runpod.io/graphql?api_key=$RUNPOD_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c 'import json,sys;print(json.dumps({"query":sys.argv[1]}))' "$QUERY")")
          echo "$RESP" | grep -q "\"imageName\":\"$IMG\"" || { echo "::error::saveTemplate nao aplicou: $RESP"; exit 1; }
          echo "reciclando workers (0 -> $WORKERS_MAX)"
          curl -sf -X PATCH "https://rest.runpod.io/v1/endpoints/$ENDPOINT_ID" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" -H "Content-Type: application/json" \
            -d '{"workersMax":0}' -o /dev/null
          sleep 30
          curl -sf -X PATCH "https://rest.runpod.io/v1/endpoints/$ENDPOINT_ID" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" -H "Content-Type: application/json" \
            -d "{\"workersMax\":$WORKERS_MAX}" -o /dev/null
          echo "deploy RunPod ok: $IMG"
