# AI-Verse — nginx reverse proxy para o Next.js (PM2 :3002).
# Instalar em /etc/nginx/sites-available/ e symlink em sites-enabled/.
# O bloco 443 + redirect 80->443 é adicionado pelo certbot automaticamente
# (certbot --nginx -d aiverse.jcsolutionsus.com) DEPOIS do DNS apontar.

server {
    listen 80;
    listen [::]:80;
    server_name aiverse.jcsolutionsus.com;

    # Uploads vão browser->R2 direto (presigned); aqui só passa API/JSON.
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Sem estes dois, o next-intl reconstruia o redirect de locale com a
        # porta interna -> vazava https://...:3002/en. Informam host/porta publica.
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;

        # Cookies de sessao do Supabase (Set-Cookie fatiados, grandes com Google
        # OAuth) estouram o buffer padrao (4k/8k) -> "upstream sent too big
        # header" -> 502 no /auth/callback. Buffers maiores resolvem.
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }
}
